<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>BetFriends - Apostas entre Amigos</title>
<style>
  :root {
    --bg: #0f1923;
    --card: #1a2c38;
    --accent: #00e701;
    --accent2: #f5a623;
    --danger: #ff4757;
    --yes: #00e701;
    --no: #ff4757;
    --text: #e8e8e8;
    --text2: #8b9baa;
    --border: #2a3d4e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; overflow-x: hidden;
  }

  /* HEADER */
  header {
    background: linear-gradient(135deg, #1a2c38, #0f1923);
    padding: 14px 16px; display: flex; justify-content: space-between;
    align-items: center; border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100;
  }
  .logo { font-size: 1.3rem; font-weight: 800; color: var(--accent); }
  .logo span { color: var(--text); }
  .user-info { display: flex; align-items: center; gap: 10px; }
  .balance {
    background: #223344; padding: 6px 12px; border-radius: 20px;
    font-weight: 700; font-size: 0.85rem; color: var(--accent);
  }
  .user-name { font-size: 0.8rem; color: var(--text2); cursor: pointer; }

  /* WELCOME */
  .welcome-overlay {
    position: fixed; inset: 0; background: rgba(15,25,35,0.97);
    display: flex; align-items: center; justify-content: center; z-index: 999;
  }
  .welcome-box {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 16px; padding: 40px 28px; text-align: center;
    max-width: 360px; width: 90%;
  }
  .welcome-box h1 { font-size: 2rem; margin-bottom: 6px; color: var(--accent); }
  .welcome-box p { color: var(--text2); margin-bottom: 24px; font-size: 0.9rem; }
  .welcome-box input {
    width: 100%; padding: 14px 16px; border-radius: 10px;
    border: 2px solid var(--border); background: var(--bg);
    color: var(--text); font-size: 1rem; outline: none;
  }
  .welcome-box input:focus { border-color: var(--accent); }
  .welcome-box button {
    width: 100%; padding: 14px; border-radius: 10px; border: none;
    background: var(--accent); color: #0f1923; font-size: 1rem;
    font-weight: 700; margin-top: 12px; cursor: pointer;
  }
  .welcome-box button:disabled { opacity: 0.4; cursor: not-allowed; }

  /* TABS */
  .tabs {
    display: flex; background: var(--card);
    border-bottom: 1px solid var(--border);
  }
  .tab {
    flex: 1; padding: 12px 16px; text-align: center;
    font-size: 0.8rem; font-weight: 600; color: var(--text2);
    cursor: pointer; border-bottom: 2px solid transparent;
  }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  main { padding: 12px; max-width: 600px; margin: 0 auto; padding-bottom: 100px; }

  /* FEED */
  .feed-bar {
    background: rgba(245,166,35,0.1); border: 1px solid rgba(245,166,35,0.2);
    border-radius: 8px; padding: 8px 12px; margin-bottom: 12px;
    font-size: 0.78rem; color: var(--accent2);
    overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
  }

  /* CREATE QUESTION */
  .create-box {
    background: var(--card); border-radius: 12px; padding: 16px;
    margin-bottom: 16px; border: 1px solid var(--border);
  }
  .create-box textarea {
    width: 100%; padding: 12px; border-radius: 8px;
    border: 2px solid var(--border); background: var(--bg);
    color: var(--text); font-size: 0.95rem; outline: none;
    resize: none; height: 60px; font-family: inherit;
  }
  .create-box textarea:focus { border-color: var(--accent); }
  .create-box textarea::placeholder { color: var(--text2); }
  .create-btn {
    width: 100%; padding: 12px; border-radius: 8px; border: none;
    background: var(--accent); color: #0f1923; font-size: 0.9rem;
    font-weight: 700; margin-top: 10px; cursor: pointer;
  }
  .create-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* QUESTION CARD */
  .q-card {
    background: var(--card); border-radius: 12px; padding: 16px;
    margin-bottom: 12px; border: 1px solid var(--border);
  }
  .q-card.resolved { opacity: 0.7; }

  .q-header { display: flex; justify-content: space-between; align-items: start; margin-bottom: 10px; }
  .q-creator { font-size: 0.7rem; color: var(--accent2); font-weight: 600; }
  .q-status {
    font-size: 0.65rem; font-weight: 700; padding: 2px 8px;
    border-radius: 10px; text-transform: uppercase;
  }
  .q-open { background: rgba(0,231,1,0.15); color: var(--accent); }
  .q-resolved-yes { background: rgba(0,231,1,0.15); color: var(--accent); }
  .q-resolved-no { background: rgba(255,71,87,0.15); color: var(--danger); }

  .q-text { font-size: 1.05rem; font-weight: 600; margin-bottom: 12px; line-height: 1.4; }

  .q-bar-container {
    height: 6px; background: #223344; border-radius: 3px;
    margin-bottom: 10px; overflow: hidden; display: flex;
  }
  .q-bar-yes { background: var(--yes); height: 100%; transition: width 0.5s; }
  .q-bar-no { background: var(--no); height: 100%; transition: width 0.5s; }

  .q-odds-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px; }

  .q-odd-btn {
    border: 2px solid transparent; border-radius: 10px;
    padding: 12px 8px; text-align: center; cursor: pointer;
    transition: all 0.2s;
  }
  .q-odd-btn.yes-btn { background: rgba(0,231,1,0.08); }
  .q-odd-btn.no-btn { background: rgba(255,71,87,0.08); }
  .q-odd-btn.yes-btn:hover, .q-odd-btn.yes-btn.selected { border-color: var(--yes); background: rgba(0,231,1,0.15); }
  .q-odd-btn.no-btn:hover, .q-odd-btn.no-btn.selected { border-color: var(--no); background: rgba(255,71,87,0.15); }
  .q-odd-btn.disabled { opacity: 0.5; cursor: default; pointer-events: none; }

  .q-odd-label { font-size: 0.75rem; color: var(--text2); margin-bottom: 2px; }
  .q-odd-value { font-size: 1.1rem; font-weight: 700; }
  .q-odd-value.yes-color { color: var(--yes); }
  .q-odd-value.no-color { color: var(--no); }

  .q-info {
    display: flex; justify-content: space-between;
    font-size: 0.72rem; color: var(--text2);
  }

  .q-resolve-row { display: flex; gap: 8px; margin-top: 10px; }
  .q-resolve-btn {
    flex: 1; padding: 10px; border-radius: 8px; border: none;
    font-weight: 700; font-size: 0.8rem; cursor: pointer;
  }
  .q-resolve-yes { background: var(--yes); color: #0f1923; }
  .q-resolve-no { background: var(--no); color: white; }

  .q-result {
    margin-top: 8px; padding: 8px 12px; border-radius: 8px;
    font-weight: 700; font-size: 0.85rem; text-align: center;
  }
  .q-result.result-yes { background: rgba(0,231,1,0.1); color: var(--yes); }
  .q-result.result-no { background: rgba(255,71,87,0.1); color: var(--no); }

  /* BETSLIP */
  .betslip {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--card); border-top: 2px solid var(--accent);
    padding: 16px; transform: translateY(100%);
    transition: transform 0.3s ease; z-index: 90;
    max-width: 600px; margin: 0 auto;
  }
  .betslip.show { transform: translateY(0); }
  .betslip-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .betslip-header h3 { font-size: 0.9rem; }
  .betslip-close { background: none; border: none; color: var(--text2); font-size: 1.2rem; cursor: pointer; }
  .betslip-question { font-size: 0.85rem; color: var(--text2); margin-bottom: 4px; }
  .betslip-pick { font-size: 1rem; font-weight: 700; margin-bottom: 12px; }
  .betslip-pick.pick-yes { color: var(--yes); }
  .betslip-pick.pick-no { color: var(--no); }

  .bet-input-row { display: flex; gap: 8px; margin-bottom: 10px; }
  .bet-input-row input {
    flex: 1; padding: 12px; border-radius: 8px;
    border: 2px solid var(--border); background: var(--bg);
    color: var(--text); font-size: 1rem; outline: none;
  }
  .bet-input-row input:focus { border-color: var(--accent); }

  .quick-values { display: flex; gap: 6px; margin-bottom: 12px; }
  .quick-val {
    flex: 1; padding: 8px; border-radius: 6px; background: #223344;
    border: none; color: var(--text); font-size: 0.8rem;
    font-weight: 600; cursor: pointer;
  }
  .quick-val:hover { background: #2a4055; }

  .potential-win {
    display: flex; justify-content: space-between;
    font-size: 0.85rem; margin-bottom: 12px; color: var(--text2);
  }
  .potential-win span { color: var(--accent); font-weight: 700; }

  .place-bet-btn {
    width: 100%; padding: 14px; border-radius: 10px; border: none;
    background: var(--accent); color: #0f1923; font-size: 1rem;
    font-weight: 700; cursor: pointer;
  }
  .place-bet-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* MY BETS */
  .my-bet {
    background: var(--card); border-radius: 12px; padding: 14px;
    margin-bottom: 10px; border-left: 3px solid var(--accent2);
  }
  .my-bet.won { border-left-color: var(--accent); }
  .my-bet.lost { border-left-color: var(--danger); }
  .my-bet-header { display: flex; justify-content: space-between; margin-bottom: 6px; }
  .my-bet-question { font-size: 0.8rem; color: var(--text2); }
  .my-bet-status {
    font-size: 0.7rem; font-weight: 700; padding: 2px 8px;
    border-radius: 10px; text-transform: uppercase;
  }
  .status-pending { background: rgba(245,166,35,0.2); color: var(--accent2); }
  .status-won { background: rgba(0,231,1,0.2); color: var(--accent); }
  .status-lost { background: rgba(255,71,87,0.2); color: var(--danger); }
  .my-bet-pick { font-weight: 600; margin-bottom: 4px; }
  .my-bet-details { font-size: 0.8rem; color: var(--text2); }
  .my-bet-details span { color: var(--accent); font-weight: 600; }

  /* RANKING */
  .rank-card {
    background: var(--card); border-radius: 12px; padding: 14px 16px;
    margin-bottom: 8px; display: flex; align-items: center;
    gap: 12px; border: 1px solid var(--border);
  }
  .rank-pos { font-size: 1.2rem; font-weight: 800; min-width: 28px; }
  .rank-info { flex: 1; }
  .rank-name { font-weight: 600; font-size: 0.95rem; }
  .rank-balance { font-weight: 700; font-size: 1rem; color: var(--accent); }
  .rank-card:nth-child(2) .rank-pos { color: #ffd700; }
  .rank-card:nth-child(3) .rank-pos { color: #c0c0c0; }
  .rank-card:nth-child(4) .rank-pos { color: #cd7f32; }

  .empty { text-align: center; padding: 40px 20px; color: var(--text2); }
  .empty-icon { font-size: 2.5rem; margin-bottom: 12px; }

  .toast {
    position: fixed; top: 70px; left: 50%;
    transform: translateX(-50%) translateY(-100px);
    padding: 12px 24px; border-radius: 10px;
    font-weight: 700; font-size: 0.9rem; z-index: 200;
    transition: transform 0.3s ease; white-space: nowrap;
    background: var(--accent); color: #0f1923;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.error { background: var(--danger); color: white; }

  .section-title {
    font-size: 0.75rem; color: var(--text2); text-transform: uppercase;
    letter-spacing: 1px; margin: 16px 0 10px; font-weight: 600;
  }

  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="welcome-overlay" id="welcomeScreen">
  <div class="welcome-box">
    <h1>BetFriends</h1>
    <p>Crie apostas sobre qualquer coisa e desafie seus amigos!</p>
    <input type="text" id="nameInput" placeholder="Seu nome ou apelido" maxlength="20" autocomplete="off">
    <button id="enterBtn" disabled>Entrar</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<header class="hidden" id="appHeader">
  <div class="logo">Bet<span>Friends</span></div>
  <div class="user-info">
    <div class="balance" id="balanceDisplay">R$ 1.000</div>
    <div class="user-name" id="userDisplay" title="Trocar conta"></div>
  </div>
</header>

<div class="tabs hidden" id="tabsBar">
  <div class="tab active" data-tab="questions">Apostas</div>
  <div class="tab" data-tab="mybets">Minhas</div>
  <div class="tab" data-tab="ranking">Ranking</div>
</div>

<main class="hidden" id="appMain">
  <div id="questionsTab"></div>
  <div id="mybetsTab" class="hidden"></div>
  <div id="rankingTab" class="hidden"></div>
</main>

<div class="betslip" id="betslip">
  <div class="betslip-header">
    <h3>Fazer Aposta</h3>
    <button class="betslip-close" id="closeBetslip">&times;</button>
  </div>
  <div class="betslip-question" id="bsQuestion"></div>
  <div class="betslip-pick" id="bsPick"></div>
  <div class="bet-input-row">
    <input type="number" id="betAmount" placeholder="Valor da aposta" min="1" step="1">
  </div>
  <div class="quick-values">
    <button class="quick-val" data-val="10">R$10</button>
    <button class="quick-val" data-val="25">R$25</button>
    <button class="quick-val" data-val="50">R$50</button>
    <button class="quick-val" data-val="100">R$100</button>
    <button class="quick-val" data-val="all">Tudo</button>
  </div>
  <div class="potential-win">
    <span>Retorno potencial:</span>
    <span id="potentialWin">R$ 0,00</span>
  </div>
  <button class="place-bet-btn" id="placeBetBtn" disabled>Apostar</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
const STORAGE_KEY = 'betfriends_user';

let currentUser = null;
let questions = [];
let myBets = [];
let ranking = [];
let selectedBet = null;

// --- Socket ---
socket.on('questions', (data) => { questions = data; renderQuestions(); });
socket.on('ranking', (data) => { ranking = data; renderRanking(); });

socket.on('bet_resolved', (data) => {
  currentUser.balance = data.newBalance;
  updateBalanceDisplay();
  if (data.status === 'won') {
    showToast(`Você ganhou R$${data.payout.toFixed(0)}! 🎉`);
  } else {
    showToast('Aposta perdida... 😔', true);
  }
  refreshData();
});

socket.on('recent_bet', (data) => {
  if (currentUser && data.userName !== currentUser.name) {
    showFeed(`🔥 ${data.userName} apostou R$${data.amount.toFixed(0)} ${data.pick} em "${data.question}"`);
  }
});

function refreshData() {
  socket.emit('get_data', (res) => {
    if (res.user) {
      currentUser = res.user;
      questions = res.questions;
      myBets = res.bets;
      ranking = res.ranking;
      updateBalanceDisplay();
      renderQuestions();
      renderMyBets();
      renderRanking();
    }
  });
}

// --- Auth ---
function joinServer(name) {
  socket.emit('join', name, (res) => {
    if (res.error) return showToast(res.error, true);
    currentUser = res.user;
    questions = res.questions;
    myBets = res.bets;
    ranking = res.ranking;
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ name: currentUser.name }));
    showApp();
  });
}

// --- Render Questions ---
function renderQuestions() {
  const container = document.getElementById('questionsTab');

  const open = questions.filter(q => q.status === 'open');
  const resolved = questions.filter(q => q.status === 'resolved');

  let html = `
    <div class="create-box">
      <textarea id="questionInput" placeholder="Crie uma aposta... Ex: Libras vai continuar namorando depois de hoje?" maxlength="200"></textarea>
      <button class="create-btn" id="createBtn" disabled>Criar Aposta</button>
    </div>
    <div class="feed-bar hidden" id="feedBar"></div>
  `;

  if (open.length) {
    html += '<div class="section-title">Apostas abertas</div>';
    open.forEach(q => html += questionCardHTML(q));
  }

  if (resolved.length) {
    html += '<div class="section-title">Encerradas</div>';
    resolved.forEach(q => html += questionCardHTML(q));
  }

  if (!open.length && !resolved.length) {
    html += '<div class="empty"><div class="empty-icon">🎯</div><p>Nenhuma aposta ainda.<br>Crie a primeira!</p></div>';
  }

  container.innerHTML = html;

  // Bind create
  const input = document.getElementById('questionInput');
  const btn = document.getElementById('createBtn');
  input.addEventListener('input', () => { btn.disabled = input.value.trim().length < 5; });
  btn.addEventListener('click', () => {
    const text = input.value.trim();
    if (text.length < 5) return;
    btn.disabled = true;
    socket.emit('create_question', text, (res) => {
      if (res.error) showToast(res.error, true);
      else { input.value = ''; showToast('Aposta criada!'); }
      btn.disabled = false;
    });
  });
}

function questionCardHTML(q) {
  const isOpen = q.status === 'open';
  const isCreator = currentUser && q.created_by === currentUser.id;
  const total = q.total_yes + q.total_no;
  const pctYes = total > 0 ? (q.total_yes / total * 100) : 50;
  const pctNo = total > 0 ? (q.total_no / total * 100) : 50;

  let statusHtml = '';
  if (isOpen) {
    statusHtml = '<span class="q-status q-open">Aberta</span>';
  } else {
    statusHtml = q.result === 'yes'
      ? '<span class="q-status q-resolved-yes">SIM ✓</span>'
      : '<span class="q-status q-resolved-no">NÃO ✗</span>';
  }

  let oddsHtml = '';
  if (isOpen) {
    oddsHtml = `
      <div class="q-odds-row">
        <div class="q-odd-btn yes-btn" onclick="selectBet(${q.id},'yes','SIM',${q.odds.yes})">
          <div class="q-odd-label">SIM</div>
          <div class="q-odd-value yes-color">${q.odds.yes.toFixed(2)}</div>
        </div>
        <div class="q-odd-btn no-btn" onclick="selectBet(${q.id},'no','NÃO',${q.odds.no})">
          <div class="q-odd-label">NÃO</div>
          <div class="q-odd-value no-color">${q.odds.no.toFixed(2)}</div>
        </div>
      </div>`;
  } else {
    oddsHtml = `
      <div class="q-result ${q.result === 'yes' ? 'result-yes' : 'result-no'}">
        Resultado: ${q.result === 'yes' ? 'SIM ✓' : 'NÃO ✗'}
      </div>`;
  }

  let resolveHtml = '';
  if (isOpen && isCreator && q.bet_count > 0) {
    resolveHtml = `
      <div class="q-resolve-row">
        <button class="q-resolve-btn q-resolve-yes" onclick="resolveQuestion(${q.id},'yes')">Resultado: SIM</button>
        <button class="q-resolve-btn q-resolve-no" onclick="resolveQuestion(${q.id},'no')">Resultado: NÃO</button>
      </div>`;
  }

  return `
    <div class="q-card ${isOpen ? '' : 'resolved'}">
      <div class="q-header">
        <div class="q-creator">por ${q.creator_name}</div>
        ${statusHtml}
      </div>
      <div class="q-text">${escapeHtml(q.text)}</div>
      <div class="q-bar-container">
        <div class="q-bar-yes" style="width:${pctYes}%"></div>
        <div class="q-bar-no" style="width:${pctNo}%"></div>
      </div>
      ${oddsHtml}
      <div class="q-info">
        <span>${q.bet_count} aposta${q.bet_count !== 1 ? 's' : ''}</span>
        <span>Pool: R$ ${total.toFixed(0)}</span>
        <span>SIM ${pctYes.toFixed(0)}% · NÃO ${pctNo.toFixed(0)}%</span>
      </div>
      ${resolveHtml}
    </div>`;
}

function escapeHtml(t) {
  const d = document.createElement('div');
  d.textContent = t;
  return d.innerHTML;
}

// --- Betslip ---
function selectBet(questionId, pick, pickLabel, odd) {
  const q = questions.find(x => x.id === questionId);
  if (!q) return;
  selectedBet = { questionId, pick, pickLabel, odd, questionText: q.text };

  document.getElementById('bsQuestion').textContent = q.text;
  const pickEl = document.getElementById('bsPick');
  pickEl.textContent = `${pickLabel} @ ${odd.toFixed(2)}`;
  pickEl.className = 'betslip-pick ' + (pick === 'yes' ? 'pick-yes' : 'pick-no');
  document.getElementById('betAmount').value = '';
  updatePotentialWin();
  document.getElementById('betslip').classList.add('show');
}

function updatePotentialWin() {
  const amount = parseFloat(document.getElementById('betAmount').value) || 0;
  const odd = selectedBet ? selectedBet.odd : 0;
  document.getElementById('potentialWin').textContent = `R$ ${(amount * odd).toFixed(2)}`;
  document.getElementById('placeBetBtn').disabled = !currentUser || amount <= 0 || amount > currentUser.balance;
}

function closeBetslip() {
  document.getElementById('betslip').classList.remove('show');
  selectedBet = null;
}

function placeBet() {
  const amount = parseFloat(document.getElementById('betAmount').value);
  if (!selectedBet || !currentUser || amount <= 0 || amount > currentUser.balance) return;
  document.getElementById('placeBetBtn').disabled = true;

  socket.emit('place_bet', {
    questionId: selectedBet.questionId,
    pick: selectedBet.pick,
    pickName: selectedBet.pickLabel,
    amount
  }, (res) => {
    if (res.error) {
      showToast(res.error, true);
      document.getElementById('placeBetBtn').disabled = false;
      return;
    }
    currentUser.balance = res.newBalance;
    myBets = res.bets;
    updateBalanceDisplay();
    renderMyBets();
    closeBetslip();
    showToast(`Aposta de R$${amount.toFixed(0)} realizada!`);
  });
}

function resolveQuestion(questionId, result) {
  const label = result === 'yes' ? 'SIM' : 'NÃO';
  if (!confirm(`Tem certeza? O resultado será "${label}" e as apostas serão pagas.`)) return;

  socket.emit('resolve_question', { questionId, result }, (res) => {
    if (res.error) showToast(res.error, true);
    else showToast('Aposta encerrada!');
  });
}

// --- My Bets ---
function renderMyBets() {
  const container = document.getElementById('mybetsTab');
  if (!myBets.length) {
    container.innerHTML = '<div class="empty"><div class="empty-icon">🎰</div><p>Nenhuma aposta feita ainda.</p></div>';
    return;
  }
  container.innerHTML = myBets.map(b => {
    const statusClass = b.status === 'pending' ? 'status-pending' : b.status === 'won' ? 'status-won' : 'status-lost';
    const statusText = b.status === 'pending' ? 'Pendente' : b.status === 'won' ? 'Ganhou' : 'Perdeu';
    return `
      <div class="my-bet ${b.status === 'pending' ? '' : b.status}">
        <div class="my-bet-header">
          <div class="my-bet-question">${escapeHtml(b.question_text)}</div>
          <span class="my-bet-status ${statusClass}">${statusText}</span>
        </div>
        <div class="my-bet-pick">${b.pick_name} @ <span style="color:var(--accent)">${b.odd.toFixed(2)}</span></div>
        <div class="my-bet-details">
          Apostou <span>R$ ${b.amount.toFixed(2)}</span> · Retorno <span>R$ ${(b.amount * b.odd).toFixed(2)}</span>
        </div>
      </div>`;
  }).join('');
}

// --- Ranking ---
function renderRanking() {
  const container = document.getElementById('rankingTab');
  if (!ranking.length) {
    container.innerHTML = '<div class="empty"><div class="empty-icon">🏆</div><p>Nenhum jogador.</p></div>';
    return;
  }
  container.innerHTML = '<div class="section-title">Ranking</div>' +
    ranking.map((u, i) => `
      <div class="rank-card" style="${currentUser && u.name === currentUser.name ? 'border-color:var(--accent)' : ''}">
        <div class="rank-pos">${i + 1}°</div>
        <div class="rank-info">
          <div class="rank-name">${escapeHtml(u.name)} ${currentUser && u.name === currentUser.name ? '(você)' : ''}</div>
        </div>
        <div class="rank-balance">R$ ${u.balance.toFixed(0)}</div>
      </div>`).join('');
}

// --- UI ---
function updateBalanceDisplay() {
  if (currentUser) document.getElementById('balanceDisplay').textContent = `R$ ${currentUser.balance.toFixed(0)}`;
}

function showToast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => t.className = 'toast', 2500);
}

function showFeed(msg) {
  const el = document.getElementById('feedBar');
  if (el) { el.textContent = msg; el.classList.remove('hidden'); setTimeout(() => el.classList.add('hidden'), 5000); }
}

function showApp() {
  document.getElementById('welcomeScreen').classList.add('hidden');
  document.getElementById('appHeader').classList.remove('hidden');
  document.getElementById('tabsBar').classList.remove('hidden');
  document.getElementById('appMain').classList.remove('hidden');
  document.getElementById('userDisplay').textContent = currentUser.name;
  updateBalanceDisplay();
  renderQuestions();
  renderMyBets();
  renderRanking();
}

// --- Tabs ---
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    const target = tab.dataset.tab;
    ['questionsTab', 'mybetsTab', 'rankingTab'].forEach(id => {
      document.getElementById(id).classList.toggle('hidden', id !== target + 'Tab');
    });
    if (target === 'mybets') refreshData();
    if (target === 'ranking') renderRanking();
  });
});

// --- Events ---
const nameInput = document.getElementById('nameInput');
const enterBtn = document.getElementById('enterBtn');
nameInput.addEventListener('input', () => { enterBtn.disabled = nameInput.value.trim().length < 2; });
nameInput.addEventListener('keydown', e => { if (e.key === 'Enter' && !enterBtn.disabled) enterBtn.click(); });
enterBtn.addEventListener('click', () => joinServer(nameInput.value.trim()));

document.getElementById('closeBetslip').addEventListener('click', closeBetslip);
document.getElementById('betAmount').addEventListener('input', updatePotentialWin);

document.querySelectorAll('.quick-val').forEach(btn => {
  btn.addEventListener('click', () => {
    const val = btn.dataset.val;
    document.getElementById('betAmount').value = val === 'all' ? currentUser.balance : val;
    updatePotentialWin();
  });
});

document.getElementById('placeBetBtn').addEventListener('click', placeBet);

document.getElementById('userDisplay').addEventListener('click', () => {
  if (confirm('Trocar de conta?')) { localStorage.removeItem(STORAGE_KEY); location.reload(); }
});

// --- Init ---
const saved = localStorage.getItem(STORAGE_KEY);
if (saved) {
  try { const { name } = JSON.parse(saved); if (name) joinServer(name); } catch(e) {}
}
</script>
</body>
</html>
